name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

# Opt into Node.js 24 for all actions (actions/checkout, actions/cache, etc.)
# GitHub forces this default on June 2, 2026 — opting in early avoids surprise breakage.
env:
  ACTIONS_RUNNER_NODE_VERSION: "24"

jobs:
  phase-12-shift-left:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "27.2"

      - name: Restore Mix cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run Phase 12 shift-left suite
        run: >
          mix test
          test/cairnloop/knowledge_automation/article_suggestion_test.exs
          test/cairnloop/knowledge_automation/review_task_test.exs
          test/cairnloop/retrieval/telemetry_test.exs
          test/cairnloop/automation/scoria_engine_test.exs
          test/cairnloop/automation/draft_generator/anthropic_test.exs
          test/cairnloop/automation/workers/draft_worker_test.exs
          test/cairnloop/web/conversation_live_test.exs
          test/cairnloop/web/knowledge_base_live/suggestion_review_test.exs
          test/cairnloop/knowledge_base/workers/chunk_revision_test.exs
          test/cairnloop/web/health_plug_test.exs
          test/cairnloop/web/metrics_plug_test.exs
          test/cairnloop/web/health_metrics_route_test.exs
          test/cairnloop/auditor_test.exs
          test/cairnloop/governance_test.exs
          test/cairnloop/doctor_test.exs

  # Static quality gate (mirrors the `mix check` alias): credo --strict, ex_doc with
  # warnings-as-errors, the packaged-tarball build, and a dependency CVE audit. Runs in the
  # default (:dev) env so the dev-only ex_doc + credo/mix_audit deps are present.
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "27.2"

      - name: Restore Mix cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Credo (strict)
        run: mix credo --strict

      - name: Docs (warnings as errors)
        run: mix docs --warnings-as-errors

      - name: Package build
        run: mix hex.build

      - name: Dependency audit
        run: mix deps.audit

  # DB-backed integration suite: exercises the real Postgres + Oban-worker + LiveView legs
  # that the headless suite cannot (Phase 15 approval flow). Tagged :integration and run
  # explicitly via `mix test.integration` (test.setup creates both repos + migrates first).
  integration:
    runs-on: ubuntu-latest

    services:
      db:
        # pgvector image: migration 20260516000000 runs `CREATE EXTENSION vector`.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15

    env:
      MIX_ENV: test
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres
      PGPORT: "5432"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "27.2"

      - name: Restore Mix cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Run integration suite (creates DBs, migrates, runs test/integration)
        run: mix test.integration

  # Real-browser E2E for the operator rail's client-only behaviors (Phase 41 / D2): the JS
  # expand/collapse-all commands, the colocated RailDensity localStorage hook + reload
  # persistence, and open-survives-PubSub (phx-update="ignore"). These run against the bundled
  # example app (the only asset-serving surface that mounts the real library rail) via
  # phoenix_test_playwright. Replaces the former Phase-41 human-verify (UAT) checkpoint.
  e2e:
    runs-on: ubuntu-latest

    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15

    env:
      MIX_ENV: test
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres
      PGPORT: "5432"

    defaults:
      run:
        working-directory: examples/cairnloop_example

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "27.2"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Restore Mix cache
        uses: actions/cache@v4
        with:
          path: |
            examples/cairnloop_example/deps
            examples/cairnloop_example/_build
          key: ${{ runner.os }}-e2e-mix-${{ hashFiles('examples/cairnloop_example/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-e2e-mix-

      - name: Install Elixir dependencies
        run: mix deps.get

      - name: Install Playwright CLI (in assets/) + Chromium
        run: |
          npm --prefix assets ci
          npx --prefix assets playwright install --with-deps chromium

      # test.e2e: assets.setup → assets.build (compile FIRST so the colocated RailDensity hook is
      # extracted and bundled — else the density tests silently pass-without-testing) → ecto
      # create/migrate → test --only e2e. On failure, capture a Playwright trace for debugging.
      - name: Run rail E2E suite
        run: PW_TRACE=true mix test.e2e

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: examples/cairnloop_example/traces/
          if-no-files-found: ignore

  # Single required status check for branch protection (solo-OSS true CI/CD).
  # Branch protection requires only `release_gate`; this job's `needs:` is the real
  # contract. Gates on the headless shift-left suite, the DB-backed `integration` suite
  # (greened on PR #6), and the static `quality` lane (credo/docs/build/audit).
  release_gate:
    name: release_gate
    runs-on: ubuntu-latest
    needs: [phase-12-shift-left, integration, quality, e2e]
    if: ${{ always() }}
    steps:
      - name: Gate on required jobs
        run: |
          if [ "${{ needs.phase-12-shift-left.result }}" != "success" ]; then
            echo "Required job 'phase-12-shift-left' did not succeed (got: ${{ needs.phase-12-shift-left.result }})."
            exit 1
          fi
          if [ "${{ needs.integration.result }}" != "success" ]; then
            echo "Required job 'integration' did not succeed (got: ${{ needs.integration.result }})."
            exit 1
          fi
          if [ "${{ needs.quality.result }}" != "success" ]; then
            echo "Required job 'quality' did not succeed (got: ${{ needs.quality.result }})."
            exit 1
          fi
          if [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "Required job 'e2e' did not succeed (got: ${{ needs.e2e.result }})."
            exit 1
          fi
          echo "All required jobs passed."
