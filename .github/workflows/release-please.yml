name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# Opt into Node.js 24 for all actions (actions/checkout, actions/cache, etc.)
# GitHub forces this default on June 2, 2026 — opting in early avoids surprise breakage.
env:
  ACTIONS_RUNNER_NODE_VERSION: "24"

concurrency:
  group: release-please-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RP_PAT || secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Solo-OSS true CI/CD: the release PR auto-merges once required checks pass.
      # With RP_PAT set, the bot's pushes chain-trigger CI and the downstream publish.
      - name: Enable auto-merge on the release PR
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.RP_PAT || secrets.RELEASE_PLEASE_TOKEN || github.token }}
        run: |
          gh pr merge --auto --merge \
            "$(echo '${{ steps.release.outputs.pr }}' | jq -r '.number')"

  publish-hex:
    runs-on: ubuntu-latest
    needs: [release-please]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    env:
      HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.sha }}

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "27.2"

      - name: Install dependencies
        run: mix deps.get

      - name: Publish dry run
        run: mix hex.publish --dry-run

      # Verify the packaged tarball actually contains the files we promise in `:files`, before the
      # irreversible publish. A Hex release is permanent after a ~60-minute revert window, so a
      # `:files`-glob regression (e.g. dropping `guides` or `priv`) must fail here, not after ship.
      - name: Verify packaged artifact contents
        run: |
          mix hex.build
          tarball="$(ls cairnloop-*.tar | head -1)"
          echo "Inspecting packaged artifact: $tarball"
          paths="$(tar -xOf "$tarball" contents.tar.gz | tar -tz | sed 's|/.*||' | sort -u)"
          echo "$paths"
          for expected in lib priv guides mix.exs README.md LICENSE CHANGELOG.md; do
            echo "$paths" | grep -qx "$expected" \
              || { echo "::error::packaged artifact is missing expected path: $expected"; exit 1; }
          done
          echo "Packaged artifact contains all expected top-level paths."

      - name: Publish package
        run: mix hex.publish --yes

      - name: Verify Hex package release
        run: mix hex.info cairnloop "${{ needs.release-please.outputs.version }}"

      - name: Verify HexDocs release
        run: |
          mix hex.docs fetch cairnloop "${{ needs.release-please.outputs.version }}"
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent --show-error --location \
              "https://hexdocs.pm/cairnloop/${{ needs.release-please.outputs.version }}/"; then
              exit 0
            fi

            if [ "$attempt" -lt 5 ]; then
              sleep 15
            fi
          done

          exit 1
