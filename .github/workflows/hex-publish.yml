name: hex-publish

# Manual recovery path: publish an already-tagged commit to Hex when the
# release-please → publish-hex chain didn't complete (e.g. RP_PAT missing on the
# first cut). Normal releases go through release-please.yml; this is the escape hatch.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag or commit SHA to publish from (e.g. v0.2.1)."
        required: true
        type: string
      release_version:
        description: 'Expected version string in mix.exs at that ref (e.g. 0.2.1).'
        required: true
        type: string

permissions:
  contents: read

env:
  ACTIONS_RUNNER_NODE_VERSION: "24"

jobs:
  publish:
    name: Publish to Hex.pm
    runs-on: ubuntu-latest
    env:
      HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "27.2"

      - name: Verify release version in mix.exs
        run: grep -n 'version: "${{ inputs.release_version }}"' mix.exs

      - name: Install dependencies
        run: mix deps.get

      - name: Publish dry run
        run: mix hex.publish --dry-run

      - name: Publish package
        run: mix hex.publish --yes

      - name: Verify Hex package release
        run: mix hex.info cairnloop "${{ inputs.release_version }}"
